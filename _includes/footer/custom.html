<!-- 简化的滚动淡入效果（性能优化） -->
<script>
(function() {
  function hideLoader() {
    var loader = document.getElementById('page-loader');
    if (!loader || loader.dataset.hidden === 'true') return;
    loader.dataset.hidden = 'true';
    loader.style.opacity = '0';
    setTimeout(function() {
      loader.style.display = 'none';
    }, 500);
  }

  function initScrollEffects() {
    try {
    var lastScroll = window.pageYOffset || 0;
    var scrollingDown = true;
    var elementStates = new WeakMap();
    var ticking = false;

    window.addEventListener('scroll', function() {
      var currentScroll = window.pageYOffset || 0;
      scrollingDown = currentScroll > lastScroll;
      lastScroll = currentScroll;
    }, { passive: true });

    var items = document.querySelectorAll('.page__content h2, .page__content h3, .page__content p, .page__content ul, .page__content ol, .archive__item, .list__item');

    function isInViewport(el) {
      var rect = el.getBoundingClientRect();
      var windowHeight = window.innerHeight;
      var top = windowHeight * 0.1;
      var bottom = windowHeight * 0.8;
      var elCenter = rect.top + rect.height / 2;
      return elCenter >= top && elCenter <= bottom;
    }

    for (var i = 0; i < items.length; i++) {
      var el = items[i];
      if (isInViewport(el)) {
        el.style.opacity = '1';
        el.style.transform = 'translateY(0)';
        el.setAttribute('data-state', 'bright');
      } else {
        el.style.opacity = '0.3';
        el.style.transform = 'translateY(0)';
        el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        el.setAttribute('data-state', 'dim');
      }
      elementStates.set(el, {
        lastToggleTime: 0,
        lastScrollPos: lastScroll,
        toggleCount: 0
      });
    }

    var observerOptions = { 
      threshold: 0.5,
      rootMargin: '-5% 0px -20% 0px'
    };

    var observer = new IntersectionObserver(function(entries) {
      if (!ticking) {
        window.requestAnimationFrame(function() {
          for (var j = 0; j < entries.length; j++) {
            var entry = entries[j];
            var el = entry.target;
            var state = el.getAttribute('data-state');
            var now = Date.now();
            var currentScrollPos = window.pageYOffset || 0;
            var elState = elementStates.get(el);

            if (!elState) {
              elementStates.set(el, {
                lastToggleTime: 0,
                lastScrollPos: currentScrollPos,
                toggleCount: 0
              });
              elState = elementStates.get(el);
            }

            var timeSinceLastToggle = now - elState.lastToggleTime;
            var scrollDistance = Math.abs(currentScrollPos - elState.lastScrollPos);

            if (timeSinceLastToggle < 200 && scrollDistance < 50) {
              elState.toggleCount++;
              if (elState.toggleCount > 2) {
                continue;
              }
            } else {
              elState.toggleCount = 0;
            }

            elState.lastToggleTime = now;
            elState.lastScrollPos = currentScrollPos;

            if (entry.isIntersecting) {
              if (state === 'dim') {
                if (scrollingDown) {
                  el.style.transition = 'none';
                  el.style.opacity = '0.3';
                  el.style.transform = 'translateY(15px)';
                  void el.offsetHeight;
                  el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                  setTimeout(function() {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                  }, 10);
                } else {
                  el.style.transform = 'translateY(0)';
                  el.style.transition = 'opacity 0.5s ease';
                  el.style.opacity = '1';
                }
                el.setAttribute('data-state', 'bright');
              }
            } else {
              if (state === 'bright') {
                el.style.transition = 'opacity 0.5s ease';
                el.style.opacity = '0.3';
                el.style.transform = 'translateY(0)';
                el.setAttribute('data-state', 'dim');
              }
            }
          }
          ticking = false;
        });
        ticking = true;
      }
    }, observerOptions);

    for (var k = 0; k < items.length; k++) {
      observer.observe(items[k]);
    }
  } catch(e) {
    console.error('Scroll animation error:', e);
  }
  }

  // 页面可交互后立即隐藏 loader，避免等待所有资源完成
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', hideLoader, { once: true });
  } else {
    hideLoader();
  }

  // 兜底：即使外部资源异常，也不会长期卡在 loading
  setTimeout(hideLoader, 1800);

  // 平滑滚动效果延后到空闲时初始化，降低首屏主线程竞争
  if ('requestIdleCallback' in window) {
    requestIdleCallback(initScrollEffects, { timeout: 1200 });
  } else {
    setTimeout(initScrollEffects, 120);
  }
})();
</script>

<!-- 页面加载时同步 body 的深色模式状态 -->
<script>
(function() {
  var t = localStorage.getItem('theme');
  if (t === 'dark') { document.body.classList.add('dark-mode'); }
  if (typeof updateThemeIcon === 'function') { updateThemeIcon(t === 'dark'); }
})();
</script>
